name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ── Job 1: Detect which modules changed ─────────────────────
  detect:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_modules: ${{ steps.detect.outputs.has_modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed modules
        id: detect
        shell: bash
        run: |
          CHANGED=()
          for dir in modules/*/; do
            MODULE=$(basename "$dir")
            if git diff --name-only HEAD~1 HEAD | grep -q "^modules/$MODULE/"; then
              CHANGED+=("$MODULE")
            fi
          done

          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "No modules changed."
            echo "has_modules=false" >> $GITHUB_OUTPUT
            echo "matrix={\"module\":[]}" >> $GITHUB_OUTPUT
          else
            JSON=$(printf '%s\n' "${CHANGED[@]}" | jq -R . | jq -sc '{module: .}')
            echo "Changed modules: $JSON"
            echo "has_modules=true" >> $GITHUB_OUTPUT
            echo "matrix=$JSON" >> $GITHUB_OUTPUT
          fi

  # ── Job 2: Publish modules whose version was bumped ─────────
  publish:
    name: Publish ${{ matrix.module }}
    needs: detect
    if: |
      github.event_name == 'push' &&
      needs.detect.outputs.has_modules == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: Roblox/setup-foreman@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          allow-external-github-orgs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Publish ${{ matrix.module }}
        id: publish
        shell: bash
        env:
          WALLY_AUTH_TOKEN: ${{ secrets.WALLY_AUTH_TOKEN }}
        run: |
          chmod +x scripts/publish.sh scripts/install-packages.sh
          scripts/publish.sh ${{ matrix.module }}

          # Expose tag and version for the release step if publish ran
          if [ -f /tmp/publish-meta.txt ]; then
            source /tmp/publish-meta.txt
            echo "tag=$tag" >> $GITHUB_OUTPUT
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.publish.outputs.published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.publish.outputs.tag }}
          name: ${{ matrix.module }} v${{ steps.publish.outputs.tag }}
          body_path: /tmp/changelog.txt
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 3: Deploy docs ──────────────────────────────────────
  docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Moonwave
        run: npm i -g moonwave

      - name: Configure git identity and credentials
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Deploy to GitHub Pages
        run: bash scripts/docs.sh build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}